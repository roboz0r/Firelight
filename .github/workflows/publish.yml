# To publish a release:
#   1. Update <PackageVersion> in Directory.Build.props
#   2. Commit: git commit -am "Bump version to 0.2.0"
#   3. Tag:    git tag v0.2.0
#   4. Push:   git push && git push origin v0.2.0

name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 0.2.0). Leave empty to use version from Directory.Build.props.'
        required: false
env:
  CONFIGURATION: Release
  NUGET_TOKEN: ${{ secrets.NUGET_TOKEN }}

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: ./global.json

      - name: Verify tag matches Directory.Build.props
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PROPS_VERSION=$(grep -oP '(?<=<PackageVersion>)[^<]+' Directory.Build.props)
          if [ "$TAG_VERSION" != "$PROPS_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match Directory.Build.props PackageVersion ($PROPS_VERSION)"
            exit 1
          fi
          echo "Tag version matches: $TAG_VERSION"

      - name: Pack Published Projects
        shell: pwsh
        run: |
          [xml]$props = Get-Content Directory.Build.props
          $v = ($props.Project.PropertyGroup | ForEach-Object { $_.PackageVersion } | Where-Object { $_ }).Trim()
          Write-Host "Package version: '$v'"

          dotnet restore
          dotnet list package
          dotnet pack

          dotnet nuget push "./src/Firelight/bin/Release/Firelight.$v.nupkg" --api-key $env:NUGET_TOKEN --source "nuget.org" --skip-duplicate
          dotnet nuget push "./src/Firelight.Context/bin/Release/Firelight.Context.$v.nupkg" --api-key $env:NUGET_TOKEN --source "nuget.org" --skip-duplicate
          dotnet nuget push "./src/Firelight.Router/bin/Release/Firelight.Router.$v.nupkg" --api-key $env:NUGET_TOKEN --source "nuget.org" --skip-duplicate
